<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パソノワ脳トレ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <img src="img/logo.png" alt="パソノワ">
        </div>
    </div>
</header>

<main>
    <img src="img/Character.png" class="bg-decoration brain" alt="">
    
    <div class="floating-cards-area">
        <img src="img/PC.png" class="f-card f1">
        <img src="img/DICE.png" class="f-card f2">
        <img src="img/hatena.png" class="f-card f3">
    </div>

    <a href="https://www.nnh.to/" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
        <div id="current-date-container">
            <div id="current-date">
                <img src="img/Calendar.png" class="date-icon" alt="カレンダー">
                <span id="date-text"></span>
            </div>
        </div>
    </a>
    
    <div class="category-area">
        <div class="category-card">
            <div class="icon-circle purple-circle">
                <img src="img/book.png" class="category-icon">
            </div>
            <h3>一般単語</h3>
            <div class="button-group">
                <a href="nomalcard/card6/nomalcard6.html"><button class="btn-count purple-btn">6枚</button></a>
                <a href="nomalcard/card9/nomalcard9.html"><button class="btn-count purple-btn">9枚</button></a>
            </div>
        </div>

        <div class="category-card">
            <div class="icon-circle blue-circle">
                <img src="img/PC.png" class="category-icon">
            </div>
            <h3>IT用語</h3>
            <div class="button-group">
                <a href="itcard/card6/itcard6.html"><button class="btn-count blue-btn">6枚</button></a>
                <a href="itcard/card9/itcard9.html"><button class="btn-count blue-btn">9枚</button></a>
            </div>
        </div>

        <div class="category-card">
            <div class="icon-circle green-circle">
                <img src="img/DICE.png" class="category-icon">
            </div>
            <h3>ランダム</h3>
            <div class="button-group">
                <a href="randomcard/card6/randomcard6.html"><button class="btn-count green-btn">6枚</button></a>
                <a href="randomcard/card9/randomcard9.html"><button class="btn-count green-btn">9枚</button></a>
            </div>
        </div>
    </div>

    <div class="bottom-games-area">
        <a href="content/rensou.html" class="game-link-card">
            <img src="img/Puzzle.png" class="game-link-icon">
            <span class="game-title">連想ゲーム</span>
            <span class="arrow">＞</span>
        </a>
        <a href="content/question.html" class="game-link-card">
            <img src="img/hatena.png" class="game-link-icon">
            <span class="game-title">質問ゲーム</span>
            <span class="arrow">＞</span>
        </a>
        <a href="content/odaigame.html" class="game-link-card">
            <img src="img/Pencil.png" class="game-link-icon">
            <span class="game-title">お題ゲーム</span>
            <span class="arrow">＞</span>
        </a>
    </div>
</main>

<footer>
    <p>&copy; 2023 パソノワ</p>
</footer>

<script>
    const dateElem = document.getElementById('date-text');
    const today = new Date();
    const y = today.getFullYear();
    const m = today.getMonth() + 1;
    const d = today.getDate();
    const w = ['日','月','火','水','木','金','土'][today.getDay()];
    dateElem.textContent = `${y}年${m}月${d}日 (${w})`;
</script>

</body>
</html>
